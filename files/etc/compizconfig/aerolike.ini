[core]
s0_active_plugins = core;composite;opengl;compiztoolbox;decor;grid;move;place;regex;resize;snap;staticswitcher;wall;animation;blur;

[blur]
s0_alpha_blur_match = class=Xfce4-panel | class=Wrapper-2.0

[grid]
s0_outline_color = #3fb8bf7f
s0_fill_color = #18877c7f

[animation]
s0_minimize_effects = animation:Glide 2;
s0_unminimize_effects = animation:Glide 2;

[place]
s0_position_matches = (name=xfce4-popup-whiskermenu) | (class=Wrapper-2.0);
s0_position_x_values = -32768;
s0_position_y_values = 32767;
s0_position_constrain_workarea = false;